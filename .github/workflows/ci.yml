name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  # ── Gate 1: Static analysis ──────────────────────────────────────────────────
  quality:
    name: Typecheck & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint

  # ── Gate 2: Backend tests + coverage ────────────────────────────────────────
  test-api:
    name: API Tests (Vitest)
    runs-on: ubuntu-latest
    needs: quality
    env:
      LOG_LEVEL: silent
      NODE_ENV: test
      JWT_SECRET: ci-test-secret-at-least-32-chars!!
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @focusflow/api test:coverage
      - uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: services/api/coverage/

  # ── Gate 3: Frontend tests + coverage ───────────────────────────────────────
  test-mobile:
    name: Mobile Tests (Jest)
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @focusflow/mobile test -- --coverage --watchAll=false
      - uses: actions/upload-artifact@v4
        with:
          name: mobile-coverage
          path: apps/mobile/coverage/

  # ── Gate 4: Build verification ──────────────────────────────────────────────
  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [test-api, test-mobile]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @focusflow/api build
      - name: Verify build output
        run: test -f services/api/dist/index.js

  # ── Deploy: API (main branch only) ──────────────────────────────────────────
  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Railway
        run: echo "Add railway/fly.io deployment here"
        # - run: railway up --service focusflow-api
